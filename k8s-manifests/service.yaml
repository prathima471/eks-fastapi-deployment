# ============================================================================
# SERVICE.YAML — Load balancer for FastAPI pods
# ============================================================================
apiVersion: v1
kind: Service
metadata:
  name: fastapi-app-service
  labels:
    app: fastapi-app
spec:
  type: ClusterIP
  selector:
    app: fastapi-app
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP

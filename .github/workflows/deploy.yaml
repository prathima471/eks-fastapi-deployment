# ============================================================================
# DEPLOY.YAML — GitHub Actions CI/CD Pipeline
# ============================================================================
# TRIGGER: Push to main branch
# FLOW: Test → Build → Scan → Push to ECR → Deploy to EKS
#
# This automates everything you did manually:
#   docker build → docker push → helm upgrade
# ============================================================================

name: Build and Deploy to EKS

# ── When does this pipeline run? ──
on:
  push:
    branches: [main]         # Only on push to main
    paths-ignore:
      - 'README.md'          # Don't deploy just for README changes
      - '*.md'
  workflow_dispatch:          # Allows manual trigger from GitHub UI

# ── Environment Variables ──
env:
  AWS_REGION: us-east-1
  CLUSTER_NAME: eks-fastapi-dev
  ECR_REPOSITORY: eks-fastapi-dev/fastapi-app

# ── Pipeline Jobs ──
jobs:

  # ════════════════════════════════════════
  # JOB 1: TEST — Lint and test the code
  # ════════════════════════════════════════
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt
          pip install flake8 pytest httpx

      - name: Lint with flake8
        run: |
          # Stop on syntax errors or undefined names
          flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warn on complexity
          flake8 app/ --count --exit-zero --max-complexity=10 --statistics

      - name: Run tests
        run: |
          cd app
          python -c "from main import app; print('App imports successfully')"

  # ════════════════════════════════════════
  # JOB 2: BUILD — Build image, scan, push to ECR
  # ════════════════════════════════════════
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test               # Only runs if tests pass!

    # OIDC authentication — no stored AWS credentials!
    # Same concept you used at Cigna (GitHub OIDC → AWS)
    permissions:
      id-token: write
      contents: read

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: |
          TAG="${{ github.sha }}"
          echo "tag=${TAG:0:8}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          cd app
          docker build -t ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.tag }} .
          docker tag ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.tag }} \
                     ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.tag }}
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'          # Don't fail build on vulnerabilities (change to 1 for strict)

      - name: Push to ECR
        run: |
          docker push ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.tag }}
          docker push ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

  # ════════════════════════════════════════
  # JOB 3: DEPLOY — Deploy to EKS with Helm
  # ════════════════════════════════════════
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build              # Only runs if build succeeds!

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Connect to EKS cluster
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.CLUSTER_NAME }}

      - name: Install Helm
        uses: azure/setup-helm@v3

      - name: Deploy with Helm
        run: |
          helm upgrade --install fastapi-app ./fastapi-chart \
            --set image.repository=${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }} \
            --set image.tag=${{ needs.build.outputs.image_tag }} \
            --set image.pullPolicy=Always \
            --set env.APP_VERSION=${{ needs.build.outputs.image_tag }} \
            --set env.ENVIRONMENT=production \
            --wait \
            --timeout 300s

      - name: Verify deployment
        run: |
          kubectl get pods -l app.kubernetes.io/name=fastapi-chart
          kubectl get svc

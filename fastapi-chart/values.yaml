# ============================================================
# VALUES.YAML — The ONE file that controls everything
# ============================================================
# Think of this like Ansible vars file.
# Templates read from here. Change values here → everything updates.
# ============================================================

replicaCount: 3

image:
  repository: fastapi-app
  tag: "v1.0.0"
  pullPolicy: Never          # Minikube uses local image

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "200m"
    memory: "128Mi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

livenessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /ready
    port: 8000
  initialDelaySeconds: 5
  periodSeconds: 10

env:
  ENVIRONMENT: "kubernetes-helm"
  APP_VERSION: "1.0.0"

ingress:
  enabled: false

serviceAccount:
  create: false